<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KwaDel Firms — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#ffffff;
    --paper:#f5f8fd;
    --navy:#001a5e;
    --blue:#2f5fd9;
    --blue-light:#e5edfc;
    --ink:#0d1226;
    --slate:#5b6472;
    --line: rgba(0,26,94,0.12);
    --line-strong: rgba(0,26,94,0.22);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  a{color:inherit;}
  .mono{font-family:'JetBrains Mono', monospace;}
  .display{font-family:'Space Grotesk', sans-serif; font-weight:700; letter-spacing:-0.01em;}

  nav{
    background:var(--white); border-bottom:1px solid var(--line);
  }
  .nav-inner{
    max-width:1180px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px;
  }
  .brand-wrap{display:flex; align-items:center; gap:10px; text-decoration:none;}
  .brand-mark{height:30px; width:auto;}
  .brand{ color:var(--navy); font-size:17px; }
  .brand span{color:#d57800;}
  .logout-btn{
    background:none; border:1px solid var(--line-strong); color:var(--navy);
    font-size:13px; font-weight:600; padding:8px 16px; border-radius:100px;
    cursor:pointer; transition:background 0.2s;
    display:none;
  }
  .logout-btn:hover{background:var(--blue-light);}

  main{max-width:1000px; margin:0 auto; padding:60px 24px;}

  /* Login card */
  .login-wrap{
    display:flex; align-items:center; justify-content:center; min-height:60vh;
  }
  .login-card{
    background:var(--white); border:1px solid var(--line); border-radius:20px;
    padding:44px; max-width:380px; width:100%;
    box-shadow:0 20px 60px rgba(0,26,94,0.08);
  }
  .login-card h1{font-size:22px; margin-bottom:8px;}
  .login-card p{color:var(--slate); font-size:14px; margin-bottom:28px; line-height:1.5;}
  .field{margin-bottom:16px;}
  .field label{
    display:block; font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--slate); margin-bottom:6px; font-weight:600;
  }
  .field input{
    width:100%; border:1px solid var(--line-strong); border-radius:10px;
    padding:11px 14px; font-size:14.5px; font-family:'Inter',sans-serif; outline:none;
    transition:border-color 0.2s;
  }
  .field input:focus{border-color:var(--blue);}
  .login-btn{
    width:100%; background:var(--navy); color:var(--white); font-weight:600; font-size:14.5px;
    padding:13px; border:none; border-radius:100px; cursor:pointer; margin-top:8px;
    transition:background 0.2s;
  }
  .login-btn:hover{background:var(--blue);}
  .login-error{
    color:#b3261e; font-size:13px; margin-top:14px; display:none;
  }

  /* Dashboard */
  .dash{display:none;}
  .dash-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:32px; flex-wrap:wrap; gap:16px;}
  .dash-head h1{font-size:28px;}
  .dash-head p{color:var(--slate); font-size:14px;}
  .filter-row{display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap;}
  .filter-chip{
    border:1px solid var(--line-strong); background:var(--white); color:var(--navy);
    font-size:12.5px; font-weight:600; padding:7px 14px; border-radius:100px; cursor:pointer;
    transition:background 0.2s, color 0.2s;
  }
  .filter-chip.active{background:var(--navy); color:var(--white); border-color:var(--navy);}

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--slate); font-size:14.5px;
    background:var(--white); border-radius:16px; border:1px solid var(--line);
  }

  .submission-card{
    background:var(--white); border:1px solid var(--line); border-radius:16px;
    padding:22px 24px; margin-bottom:14px;
  }
  .submission-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px;}
  .submission-name{font-size:16px; font-weight:600;}
  .submission-tag{
    font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; font-weight:700;
    padding:4px 10px; border-radius:100px;
  }
  .tag-branding{background:var(--blue-light); color:var(--navy);}
  .tag-agriculture{background:#e7f3e0; color:#0f4a2a;}
  .tag-music{background:#f2ebfc; color:#4c1d95;}
  .submission-meta{display:flex; gap:16px; flex-wrap:wrap; font-size:12.5px; color:var(--slate); margin-bottom:10px;}
  .submission-meta b{color:var(--ink); font-weight:600;}
  .submission-message{font-size:14px; line-height:1.6; color:var(--ink);}
  .submission-date{font-size:11.5px; color:var(--slate); font-family:'JetBrains Mono',monospace;}

  .loading{text-align:center; padding:60px 20px; color:var(--slate);}
</style>
</head>

  <main>

    <div class="login-wrap" id="loginWrap">
      <div class="login-card">
        <h1 class="display">Admin sign in</h1>
        <p>Log in with the admin account you created in Supabase to view contact form submissions.</p>
        <form id="loginForm">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="you@kwadelfirms.com">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
          </div>
          <button type="submit" class="login-btn">Log in</button>
          <div class="login-error" id="loginError">Incorrect email or password.</div>
        </form>
      </div>
    </div>

    <div class="dash" id="dash">
      <div class="dash-head">
        <div>
          <h1 class="display">Inquiries</h1>
          <p>All contact form submissions across KwaDel Firms.</p>
        </div>
      </div>

      <div class="filter-row" id="filterRow">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="branding">Branding</button>
        <button class="filter-chip" data-filter="agriculture">Agriculture</button>
        <button class="filter-chip" data-filter="music">Music</button>
      </div>

      <div id="submissionsList">
        <div class="loading">Loading submissions…</div>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://jqbcwbvfuojjdneppwjq.supabase.co/';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxYmN3YnZmdW9qamRuZXBwd2pxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzODIwNjksImV4cCI6MjA5ODk1ODA2OX0.ZAkVdmrdspOkRhIilQczDclOi3J68SkxkSJyUbHhhAg';
    const supabaseClient = (SUPABASE_URL.startsWith('http'))
      ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    const loginWrap = document.getElementById('loginWrap');
    const dash = document.getElementById('dash');
    const logoutBtn = document.getElementById('logoutBtn');
    let allSubmissions = [];
    let activeFilter = 'all';

    function showDashboard(){
      loginWrap.style.display = 'none';
      dash.style.display = 'block';
      logoutBtn.style.display = 'inline-block';
      loadSubmissions();
    }

    function showLogin(){
      loginWrap.style.display = 'flex';
      dash.style.display = 'none';
      logoutBtn.style.display = 'none';
    }

    async function isCurrentUserAdmin(){
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) return false;
      const { data, error } = await supabaseClient
        .from('profiles')
        .select('is_admin')
        .eq('id', user.id)
        .single();
      if (error || !data) return false;
      return data.is_admin === true;
    }

    async function checkSession(){
      if (!supabaseClient) {
        document.getElementById('loginError').textContent =
          'Backend not configured yet — add your Supabase URL and key in this file.';
        document.getElementById('loginError').style.display = 'block';
        return;
      }
      const { data } = await supabaseClient.auth.getSession();
      if (data.session && await isCurrentUserAdmin()) {
        showDashboard();
      } else {
        if (data.session) await supabaseClient.auth.signOut();
        showLogin();
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        return;
      }

      if (await isCurrentUserAdmin()) {
        showDashboard();
      } else {
        await supabaseClient.auth.signOut();
        errorEl.textContent = "This login is for KwaDel staff only. If you're a client, use the Client Portal instead.";
        errorEl.style.display = 'block';
      }
    });

    logoutBtn.addEventListener('click', async function(){
      await supabaseClient.auth.signOut();
      showLogin();
    });

    async function loadSubmissions(){
      const listEl = document.getElementById('submissionsList');
      listEl.innerHTML = '<div class="loading">Loading submissions…</div>';

      const { data, error } = await supabaseClient
        .from('contact_submissions')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        listEl.innerHTML = '<div class="empty-state">Could not load submissions: ' + error.message + '</div>';
        return;
      }

      allSubmissions = data || [];
      renderSubmissions();
    }

    function renderSubmissions(){
      const listEl = document.getElementById('submissionsList');
      const filtered = activeFilter === 'all'
        ? allSubmissions
        : allSubmissions.filter(s => s.subsidiary === activeFilter);

      if (filtered.length === 0) {
        listEl.innerHTML = '<div class="empty-state">No submissions yet.</div>';
        return;
      }

      listEl.innerHTML = filtered.map(s => {
        const date = new Date(s.created_at).toLocaleString();
        const tagClass = 'tag-' + (s.subsidiary || 'branding');
        return `
          <div class="submission-card">
            <div class="submission-top">
              <span class="submission-name">${escapeHtml(s.name)}</span>
              <span class="submission-tag ${tagClass}">${escapeHtml(s.subsidiary || 'branding')}</span>
            </div>
            <div class="submission-meta">
              <span><b>Contact:</b> ${escapeHtml(s.contact)}</span>
              ${s.service ? `<span><b>Service:</b> ${escapeHtml(s.service)}</span>` : ''}
              <span class="submission-date">${date}</span>
            </div>
            <div class="submission-message">${escapeHtml(s.message)}</div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(str){
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    document.getElementById('filterRow').addEventListener('click', function(e){
      const btn = e.target.closest('.filter-chip');
      if (!btn) return;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderSubmissions();
    });

    checkSession();
  </script>

</body>
</html>
